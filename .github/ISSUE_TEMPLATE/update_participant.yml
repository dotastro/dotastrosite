name: Update my record
description: Correct or update your entry in the .Astronomy community directory
title: "update: [your name]"
labels: ["content", "participant"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to correct or update your entry in the [community directory](https://dotastro.github.io/dotastrosite/community/participants). Changes will be reviewed and applied within a few days.

  - type: input
    id: name
    attributes:
      label: Your name (as it appears in the directory, or should appear)
      placeholder: "Jane Smith"
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: What needs to change?
      options:
        - I am missing from the directory entirely
        - My affiliation is wrong or out of date
        - My name is misspelled or formatted incorrectly
        - I am listed as attending an event I did not attend
        - I attended an event not listed against my name
        - My Bluesky handle is missing or wrong
        - Other
    validations:
      required: true

  - type: checkboxes
    id: events_attended
    attributes:
      label: Events I attended (tick all that apply)
      description: Only fill this in if you are correcting your attendance record.
      options:
        - label: ".Astronomy 1 — Cardiff, 2008"
        - label: ".Astronomy 2 — Leiden, 2009"
        - label: ".Astronomy 3 — Oxford, 2011"
        - label: ".Astronomy 4 — Heidelberg, 2012"
        - label: ".Astronomy 5 — Cambridge MA, 2013"
        - label: ".Astronomy 6 — Chicago, 2014"
        - label: ".Astronomy 7 — Sydney, 2015"
        - label: ".Astronomy 8 — Oxford, 2016"
        - label: ".Astronomy 9 — Cape Town, 2017"
        - label: ".Astronomy X — Baltimore, 2018"
        - label: ".Astronomy 11 — Toronto, 2019"
        - label: ".Astronomy alpha — Online, 2020"
        - label: ".Astronomy 12 — New York, 2023"
        - label: ".Astronomy 13 — Madrid, 2024"

  - type: textarea
    id: details
    attributes:
      label: Anything else to correct?
      description: Affiliation, name spelling, Bluesky handle, or other details.
      placeholder: |
        e.g. My affiliation should be: University of Edinburgh (not Oxford).
        My Bluesky is: janesmith.bsky.social

  - type: input
    id: bluesky
    attributes:
      label: Your Bluesky handle (optional, if you want it added)
      placeholder: "yourhandle.bsky.social"

  - type: checkboxes
    id: consent
    attributes:
      label: Consent
      options:
        - label: I consent to my name and affiliation being listed publicly in the directory
          required: true
