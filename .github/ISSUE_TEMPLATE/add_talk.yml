name: Add a talk
description: Add a talk, lightning talk, or presentation from a .Astronomy event
title: "talk: [event] — [speaker name]"
labels: ["content", "talk"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the .Astronomy archive!

**Note:** Submissions are reviewed by the .Astronomy team before being added to the site. This may take a few days to a few weeks. You'll be notified here when your contribution goes live. Fill in as much as you know.

  - type: dropdown
    id: event
    attributes:
      label: Which event?
      options:
        - ".Astronomy 1 — Cardiff, 2008"
        - ".Astronomy 2 — Leiden, 2009"
        - ".Astronomy 3 — Oxford, 2011"
        - ".Astronomy 4 — Heidelberg, 2012"
        - ".Astronomy 5 — Cambridge MA, 2013"
        - ".Astronomy 6 — Chicago, 2014"
        - ".Astronomy 7 — Sydney, 2015"
        - ".Astronomy 8 — Oxford, 2016"
        - ".Astronomy 9 — Cape Town, 2017"
        - ".Astronomy X — Baltimore, 2018"
        - ".Astronomy 11 — Toronto, 2019"
        - ".Astronomy alpha — Online, 2020"
        - ".Astronomy 12 — New York, 2023"
        - ".Astronomy 13 — Madrid, 2024"
    validations:
      required: true

  - type: input
    id: speaker
    attributes:
      label: Speaker name
      placeholder: "Jane Smith"
    validations:
      required: true

  - type: input
    id: affiliation
    attributes:
      label: Affiliation at the time
      placeholder: "University of Oxford"

  - type: input
    id: title
    attributes:
      label: Talk title
      placeholder: "What I did at .Astronomy"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Talk type
      options:
        - Invited talk
        - Lightning talk
        - Day Zero tutorial
        - Unconference session
        - Remote / video presentation
        - Other

  - type: input
    id: slides_url
    attributes:
      label: Slides URL
      placeholder: "https://..."

  - type: input
    id: video_url
    attributes:
      label: Recording URL
      placeholder: "https://youtube.com/..."

  - type: textarea
    id: notes
    attributes:
      label: Notes or description
      description: Anything else worth recording -- abstract, key points, context.
