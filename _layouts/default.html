<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — .Astronomy</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="site-baseurl" content="{{ site.baseurl }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  <script>
    (function() {
      var saved = localStorage.getItem('dotastro-theme');
      var preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="nav-inner">

      <a href="{{ site.baseurl }}/" class="site-logo">
        <img src="{{ site.baseurl }}/assets/dotlogo_white.png" alt=".Astronomy">
      </a>

      <div class="nav-right">
        <button class="nav-search-btn" data-search-open aria-label="Search site">
          Search
          <span class="nav-search-kbd">⌘K</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="nav-links">
          <a href="{{ site.baseurl }}/events/">Events</a>
          <a href="{{ site.baseurl }}/events/upcoming">Upcoming</a>
          <a href="{{ site.baseurl }}/community/">Community</a>

          <div class="nav-more" id="nav-more-wrap">
            <button class="nav-more-btn" id="nav-more-btn" aria-expanded="false" aria-haspopup="menu">
              More <span class="nav-more-chevron">▾</span>
            </button>
            <div class="nav-more-menu" id="nav-more-menu" role="menu">
              <a href="{{ site.baseurl }}/nominate" role="menuitem" class="nav-more-highlight">Nominate someone</a>
              <div class="nav-more-divider"></div>
              <a href="{{ site.baseurl }}/brain-trust" role="menuitem">Brain Trust</a>
              <a href="{{ site.baseurl }}/foundation/" role="menuitem">Foundation</a>
              <a href="{{ site.baseurl }}/about" role="menuitem">About</a>
              <a href="{{ site.baseurl }}/code-of-conduct" role="menuitem">Code of Conduct</a>
              <div class="nav-more-divider"></div>
              <a href="https://github.com/dotastro" target="_blank" rel="noopener" role="menuitem">GitHub ↗</a>
            </div>
          </div>
        </div>

        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
          <span class="icon-dark"></span>
          <span class="icon-light"></span>
        </button>
      </div>

    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <img src="{{ site.baseurl }}/assets/dotlogo_white.png" alt=".Astronomy">
      <span>The .Astronomy Foundation</span>
      <span>Founded Cardiff, 2008</span>
      <a href="https://github.com/dotastro">github.com/dotastro</a>
    </div>
  </footer>

  <!-- Search overlay -->
  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Site search">
    <div class="search-box">
      <div class="search-input-wrap">
        <input class="search-input" id="search-input" type="search" placeholder="Search talks, hacks, people, events..." autocomplete="off" spellcheck="false">
        <button class="search-close" id="search-close" aria-label="Close search"></button>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Type to search talks, hacks, people, events...</div>
      </div>
      <p class="search-hint">Press <kbd style="font-family:var(--font-mono);font-size:0.7rem;background:var(--bg-3);border:1px solid var(--border-hi);border-radius:4px;padding:1px 5px">/</kbd> or <kbd style="font-family:var(--font-mono);font-size:0.7rem;background:var(--bg-3);border:1px solid var(--border-hi);border-radius:4px;padding:1px 5px">⌘K</kbd> to open &nbsp;·&nbsp; <kbd style="font-family:var(--font-mono);font-size:0.7rem;background:var(--bg-3);border:1px solid var(--border-hi);border-radius:4px;padding:1px 5px">Esc</kbd> to close</p>
    </div>
  </div>

  <div class="bg-corner-credit" id="bg-corner-credit">
    <span class="bg-corner-label">Image:</span>
    <a href="#" target="_blank" rel="noopener" id="bg-corner-link"></a>
    <button class="bg-corner-cycle" id="bg-corner-cycle-btn" aria-label="Next background image" title="Next image">&#8594;</button>
  </div>

  <script src="{{ site.baseurl }}/assets/js/background.js"></script>
  <script src="{{ site.baseurl }}/assets/js/search.js"></script>
  <script>
    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('dotastro-theme', next);
    });

    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function (e) {
      if (!localStorage.getItem('dotastro-theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
      }
    });

    // Mobile hamburger
    (function () {
      var ham = document.getElementById('hamburger');
      var navLinks = document.getElementById('nav-links');
      if (!ham) return;

      ham.addEventListener('click', function () {
        var open = ham.getAttribute('aria-expanded') === 'true';
        ham.setAttribute('aria-expanded', !open);
        ham.classList.toggle('is-open', !open);
        navLinks.classList.toggle('mobile-open', !open);
        document.body.classList.toggle('nav-open', !open);
      });

      // Close on link click
      navLinks.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          ham.setAttribute('aria-expanded', 'false');
          ham.classList.remove('is-open');
          navLinks.classList.remove('mobile-open');
          document.body.classList.remove('nav-open');
        });
      });
    })();

    // More dropdown
    (function () {
      var btn = document.getElementById('nav-more-btn');
      var menu = document.getElementById('nav-more-menu');

      function openMenu() {
        btn.setAttribute('aria-expanded', 'true');
        menu.classList.add('is-open');
      }

      function closeMenu() {
        btn.setAttribute('aria-expanded', 'false');
        menu.classList.remove('is-open');
      }

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (menu.classList.contains('is-open')) {
          closeMenu();
        } else {
          openMenu();
        }
      });

      // Close on outside click
      document.addEventListener('click', function () {
        closeMenu();
      });

      // Don't close when clicking inside the menu
      menu.addEventListener('click', function (e) {
        e.stopPropagation();
      });

      // Close on Escape
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeMenu();
      });
    })();
  </script>
</body>
</html>
