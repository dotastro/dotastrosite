<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="{{ site.baseurl }}/" class="site-title">{{ site.title }}</a>
      <a href="{{ site.baseurl }}/events/">Events</a>
      <a href="{{ site.baseurl }}/about">About</a>
      <a href="{{ site.baseurl }}/community/">Community</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>&copy; The .Astronomy Foundation | <a href="https://github.com/{{ site.github_username }}">GitHub</a></p>
  </footer>
</body>
</html>
