<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — .Astronomy</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="site-baseurl" content="{{ site.baseurl }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  <script>
    (function() {
      var saved = localStorage.getItem('dotastro-theme');
      var preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="nav-inner">

      <a href="{{ site.baseurl }}/" class="site-logo">
        <img src="{{ site.baseurl }}/assets/dotlogo_white.png" alt=".Astronomy">
      </a>

      <div class="nav-right">
        <div class="nav-links">
          <a href="{{ site.baseurl }}/events/">Events</a>
          <a href="{{ site.baseurl }}/events/upcoming">Upcoming</a>
          <a href="{{ site.baseurl }}/community/">Community</a>

          <!-- More dropdown -->
          <div class="nav-more" id="nav-more">
            <button class="nav-more-btn" id="nav-more-btn" aria-expanded="false" aria-haspopup="true">
              More <span class="nav-more-chevron">&#8964;</span>
            </button>
            <div class="nav-more-menu" id="nav-more-menu" role="menu">
              <a href="{{ site.baseurl }}/brain-trust" role="menuitem">Brain Trust</a>
              <a href="{{ site.baseurl }}/foundation/" role="menuitem">Foundation</a>
              <a href="{{ site.baseurl }}/about" role="menuitem">About</a>
              <div class="nav-more-divider"></div>
              <a href="https://github.com/dotastro" target="_blank" rel="noopener" role="menuitem">GitHub</a>
            </div>
          </div>

          <a href="{{ site.baseurl }}/nominate" class="nav-nominate">Nominate</a>
        </div>

        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
          <span class="icon-dark">☀</span>
          <span class="icon-light">☽</span>
        </button>
      </div>

    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <img src="{{ site.baseurl }}/assets/dotlogo_white.png" alt=".Astronomy">
      <span>The .Astronomy Foundation</span>
      <span>Founded Cardiff, 2008</span>
      <a href="https://github.com/dotastro">github.com/dotastro</a>
    </div>
  </footer>

  <div class="bg-corner-credit" id="bg-corner-credit">
    <span class="bg-corner-label">Image:</span>
    <a href="#" target="_blank" rel="noopener"></a>
  </div>

  <script src="{{ site.baseurl }}/assets/js/background.js"></script>
  <script>
    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('dotastro-theme', next);
    });

    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
      if (!localStorage.getItem('dotastro-theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
      }
    });

    // More dropdown
    var moreBtn = document.getElementById('nav-more-btn');
    var moreMenu = document.getElementById('nav-more-menu');

    moreBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var open = moreBtn.getAttribute('aria-expanded') === 'true';
      moreBtn.setAttribute('aria-expanded', !open);
      moreMenu.classList.toggle('open', !open);
    });

    document.addEventListener('click', function() {
      moreBtn.setAttribute('aria-expanded', 'false');
      moreMenu.classList.remove('open');
    });

    moreMenu.addEventListener('click', function(e) { e.stopPropagation(); });
  </script>
</body>
</html>
