slug: thirteen
number: "13"
name: .Astronomy 13
year: 2024
city: Madrid
country: Spain
venue: "European Space Astronomy Centre (ESAC), near Madrid, Spain"
dates: 23–26 April 2024
description: ".Astronomy 13 was held at the European Space Astronomy Centre (ESAC) near Madrid, Spain. ESAC is ESA's centre\
  \ for space science missions and data archives, making it a fitting host for a conference about astronomy, technology, and\
  \ data. This was the first .Astronomy at a European Space Agency facility. .Astronomy is not a traditional conference. It\
  \ is a gathering of around 100 astronomy enthusiasts, passionate about how the web and technology can transform science."
