slug: ten
number: X
name: .Astronomy X
year: 2018
city: Baltimore
country: United States
venue: "Space Telescope Science Institute (STScI), Baltimore, Maryland"
dates: 24–27 September 2018
description: "The tenth edition of .Astronomy, held at the Space Telescope Science Institute in Baltimore -- science operations\
  \ centre for the Hubble Space Telescope and James Webb Space Telescope. The Roman numeral X made for a fittingly memorable\
  \ name. Organised jointly by STScI staff and the .Astronomy Brain Trust."
