slug: eight
number: "8"
name: .Astronomy 8
year: 2016
city: Oxford
country: United Kingdom
venue: "Pembroke College, Oxford University"
dates: 20–23 June 2016
description: "The eighth .Astronomy conference was held at Pembroke College, Oxford. Organised by Becky Smethurst, an Oxford\
  \ PhD student at the time, supported by Chris Lintott and Sarah Kendrew. This edition featured a Day 0 tutorials day following\
  \ the success of its introduction at .Astronomy 7 in Sydney. The Hack Day took place on Wednesday 22nd June 2016. Topics\
  \ covered open science in the Kepler missions, hardware hacking, citizen science, LSST data schools, the use of library\
  \ archives in astronomy, and ESA Sky."
