talks:
- speaker: Sarah Kendrew
  type: invited
  affiliation: "ESA, STScI"
  title: "JWST and Astronomy -- bringing JWST into the 21st century with better community tools"
  notes: Discussed coordination with Astropy developers and the WebbCam live clean room feed. Science proposals opening November
    2017.
- speaker: Bruno Merin
  type: invited
  affiliation: ESA
  title: "ESASky -- a multi-mission interface"
  notes: "Demonstrated the whole-sky viewer serving data from GALEX, 2MASS, WISE, Herschel, Planck and more."
- speaker: Carl Ferkinhoff
  type: invited
  affiliation: Winona State University
  title: Open Source Hardware in Astronomy
  notes: "The hardware.astronomy project: developing lower-cost instruments, involving undergrads, and creating open standards\
    \ for astronomical hardware."
- speaker: Ali Swanson
  type: invited
  affiliation: Oxford / Zooniverse
  title: Citizen Science with the Zooniverse
  notes: "Amateur consensus agrees with experts 97% of the time. Create your own project at zooniverse.org."
- speaker: James Gilbert
  type: invited
  affiliation: Oxford
  title: "Gaffa tape and string: professional hardware hacking"
  notes: "How he prototyped a vacuum-based \"Starbugs\" fibre positioning system in days, proving the concept when the formal\
    \ process had stalled. Lean prototypes win faith."
- speaker: Geert Barentsen
  type: invited
  affiliation: NASA Ames
  title: Open Science with K2
  notes: "Argued for radical openness: no proprietary data, no walls around large missions. K2's open approach produced more\
    \ authors, more early-career researchers, and more publications than the closed Kepler mission with a 5x larger budget."
- speaker: Aleks Scholz
  type: lightning
  affiliation: University of St Andrews
  title: "#foundthem"
  notes: "SETI, open vs closed science, and communicating with the public"
- speaker: Ashley Villar
  type: lightning
  affiliation: Harvard
  title: astrobites.org
  notes: "send your undergrads to Astrobites for advice, articles, and tutorials"
- speaker: Edward Gomez
  type: lightning
  affiliation: Las Cumbres Observatory
  title: There is no such thing as a stupid question
  notes: comic book for young astronomers
- speaker: Coleman Krawczyk
  type: lightning
  affiliation: University of Portsmouth
  title: Astronomy projects for the blind and visually impaired
  notes: 3D printing galaxies as a tactile tool
- speaker: Matthew Graham
  type: lightning
  affiliation: Caltech/NOAO
  title: NOAO Data Lab
- speaker: "Justyn Campbell-White"
  type: lightning
  affiliation: University of Kent
  title: Classifying Stellar Bubbles
  notes: citizen science data in a PhD project
- speaker: Adam Avison
  type: lightning
  affiliation: ALMA
  title: The Pynterferometer
- speaker: William Roby
  type: lightning
  affiliation: Caltech
  title: A short history of JavaScript
  notes: ES6 and functional principles
- speaker: Edward Gomez
  type: lightning
  affiliation: Las Cumbres Observatory
  title: "Asteroid Day -- June 30th, 2016"
  notes: international NEA observation effort
- speaker: Aleks Scholz
  type: talk
  title: "WETI: The Wait for Extraterrestrial Intelligence!"
talks_narrative: "Contributors: Sarah Kendrew, Arna Karick, Demitri Muna, Scott Thomas, Lisa Ballard, Brian Cherinka, Philipp\
  \ Plewa, Thomas Robitaille, Edward Gomez, Geert Barentsen. Topics: programming languages and tools, GitHub, web hosting,\
  \ Flask, D3, web scraping, Django, argparse."
hacks:
- title: .draft
  creators:
  - Andy Casey
  description: Automagically highlight LaTeX differences between GitHub drafts.
  live_url: "https://gentle-cove-44775.herokuapp.com/"
- title: "StingRA: Simbad Quick-Look Chrome Extension"
  creators:
  - Hugh Osborn
  - Jonathan Fay
  description: "A Chrome extension that lets astronomers highlight an astronomical object and open a quick-look pop-up of\
    \ magnitudes, images, sky position, and links to SIMBAD and WorldWide Telescope."
  source_url: "http://github.com/astrojonathan/StingRA"
  live_url: "https://chrome.google.com/webstore/detail/stingra/jopoiaekgcofgjjlmcckfnafbjpedeim"
- title: "Are You Still Talking?"
  creators:
  - Edward Gomez
  description: "Use a blink(1) light to control your speakers when chairing a session. A Python package that installs a command-line\
    \ talk timer, green while talking, orange in the warning period, red when time's up."
  source_url: "http://github.com/zemogle/session_chair"
- title: arxiv59
  creators:
  - Andy Casey
  description: "Twitter bot that posts papers which missed the top-of-the-arXiv deadline by about a second."
  source_url: "https://github.com/andycasey/arxiv59"
  live_url: "https://twitter.com/arxiv59"
- title: The ArXiv Mailer
  creators:
  - "Dan Foreman-Mackey"
  description: An app to modernise the formatting of the daily arXiv email.
  source_url: "https://github.com/dfm/ArXivMailer"
  live_url: "http://arxiv.dfm.io"
- title: AstroBadger
  creators:
  - Matthew Kenworthy
  - Lisa Ballard
  description: "Getting you in the habit of writing 200 academic words per day, every day. Gamified writing! Chrome plugin\
    \ plus Flask app."
  source_url: "https://github.com/basilleaf/astrobadger"
- title: AstroGoldStars
  creators:
  - Geert Barentsen
  - Kelle Cruz
  description: "Give a Gold Star to a fellow scientist by tweeting @username++ at @AstroGoldStars on Twitter. Solves credit\
    \ sharing in science."
  source_url: "http://github.com/barentsen/AstroGoldStars"
  live_url: "https://twitter.com/AstroGoldStars"
- title: "bvi-sonification"
  creators:
  - Coleman Krawczyk
  - Jamie Ferguson
  - Andy Newsam
  - Adam Avison
  - Philipp Plewa
  description: Uses a Leap Motion device to allow a user to listen to a galaxy's spectra based on hand position.
  source_url: "https://github.com/jamieferguson94/bvi-sonification/tree/master"
- title: Fakespeare
  creators:
  - Ruth Angus
  - "Dan Foreman-Mackey"
  description: A LSTM neural network trained on the corpus of all Shakespeare plays that can generate hilarious and nonsensical
    plays.
  source_url: "https://github.com/RuthAngus/Fakespeare"
- title: Galaxy Zoo Maze
  creators:
  - James Gilbert
  - Ricarda Beckman
  - Ellen Schallig
  - Becky Smethurst
  - Marten Veldthuis
  description: "Creates a responsive view of a Zooniverse subject and a QR code, then supports scanning and reacting to results."
  source_url: "https://github.com/chrislintott/GZMaze"
  live_url: "http://gzmaze.herokuapp.com"
- title: GitNL
  creators:
  - Brett Andrews
  - Brian Cherinka
  - Erik Tollerud
  description: Run Git commands using normal English sentences parsed with Google's natural language processor.
  source_url: "http://github.com/eteq/gitnl"
- title: Hacks Collector
  creators:
  - Erik Tollerud
  - Daina Bouquin
  - Tom Robitaille
  - Edward Gomez
  - Becky Smethurst
  - Arna Karick
  description: A way to archive all hacks made at .Astronomy conferences. Each hack has a separate YAML file containing all
    metadata.
  source_url: "http://github.com/dotastro/hacks-collector"
  live_url: "https://dotastro.github.io/hacks-collector/"
- title: Markov Papers
  creators:
  - Benjamin Pope
  description: Generates paper titles/abstracts with a Markov chain trained on real papers returned by any ADS search keywords.
  source_url: "https://github.com/benjaminpope/markovpapers"
- title: Meta^4hack
  creators:
  - Erik Tollerud
  - Daina Bouquin
  - Tom Robitaille
  description: "Metadata on a hack about metadata on hacks, the submission form for this hack list."
  source_url: "https://github.com/dotastro/hack-list-submission-app"
  live_url: "https://dotastronomy-hack-submitter.herokuapp.com"
- title: Project Apollo Stories
  creators:
  - Arna Karick
  - Sam Vaughan
  description: "A Zooniverse Project to re-create incredible stories from the Apollo missions using selected images from the\
    \ Apollo Project Flickr gallery and Timeline JS."
  source_url: "https://github.com/samvaughan/ApolloProject"
  live_url: "https://www.zooniverse.org/projects/projectapollo-dotastro8/project-apollo-stories"
- title: SIMBAD the Bot
  creators:
  - Simon Murphy
  description: "Twitter bot that tweets a multi-wavelength animated GIF of a random SIMBAD object a few times a day."
  source_url: "https://github.com/simonmurphy/simbad-the-bot"
  live_url: "https://twitter.com/simbad_the_bot"
- title: Spacebar
  creators:
  - Scott Thomas
  description: "Astronomy-themed mini-games where you only need the spacebar. Keep rain out of the dome while observing, find\
    \ the galaxies, and more."
  source_url: "http://github.com/swt30/spacebar"
  live_url: "http://ast.rono.me/files/spacebar"
- title: Stellar Autopsies Zooniverse
  creators:
  - Adam A. Miller
  - Brigitta Sipocz
  - Ashley Villar
  description: A Zooniverse Project to classify the light curves of dying stars.
  source_url: "https://github.com/bsipocz/stellar-autopsies"
  live_url: "https://www.zooniverse.org/projects/adamamiller/stellar-autopsies"
