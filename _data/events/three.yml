hacks:
- title: Pluto the Previous Planet
  creators:
  - Amanda Bauer
  description: "A song about Pluto's demotion from planetary status, performed by Amanda Bauer and collaborators at the hack\
    \ day. Covered by Universe Today."
  live_url: "https://www.universetoday.com/articles/new-hit-single-pluto-the-previous-planet"
- title: Chromotone
  creators:
  - Jon Yardley
  - Chris North
  - Haley Gomez
  - Edward Gomez
  description: "Exploring multiwavelength astronomy with sound. Each waveband has a pitch; the intensity/brightness in that\
    \ waveband is represented by the volume of a note. When you scan a mouse over an image, Chromotone plays a chord with\
    \ components corresponding to the intensity at each pixel. This .Astronomy 3 version aimed to make a lighter, more web-friendly\
    \ version of the original Processing implementation, with added functionality."
  source_url: "https://github.com/jonyardley/Chromotone"
