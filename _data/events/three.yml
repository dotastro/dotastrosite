name: .Astronomy 3
year: 2011
city: Oxford
country: United Kingdom
venue: "New College, Oxford University"
dates: 4–8 April 2011
description: "The third .Astronomy conference was held at New College, Oxford. It brought together the growing community of\
  \ astronomers, developers, educators, and communicators interested in using the web and new technology to advance astronomy.\
  \ Topics ranged from citizen science and Amazon Web Services to browser-based visualisation and careers for astronomers\
  \ leaving academia. A .Astronomy 3 trailer was produced by Markus Poessel. Amanda Bauer and the TNOs performed \"Pluto,\
  \ the Previous Planet\" during the conference."
