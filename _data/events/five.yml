description: "The fifth .Astronomy conference was held at Microsoft Research's New England Research and Development (NERD)\
  \ Center in Cambridge, Massachusetts, hosted by the Seamless Astronomy group at Harvard's Center for Astrophysics. It was\
  \ the first .Astronomy event in North America, bringing the conference to a new continent. 60% of attendees were new to\
  \ the meeting. The gender balance was 33% female."
