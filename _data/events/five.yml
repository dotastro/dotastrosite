talks_narrative: |-
  Stuart Lynn argued that as Big Data grows, citizen science projects need smarter analysis methods and better use of volunteer time.
  David Hogg presented a project using astronomical images posted to Flickr by astrophotographers worldwide to build an all-sky survey. Using astrometry.net to calibrate the images, his team was finding stars that the professional astronomical literature had never catalogued.
  Alberto Accomazzi announced the launch of ADS 2.0, featuring a new search engine with iterative refinement, a public API, and powerful query capabilities including grant acknowledgment searches and citation analysis.
hacks:
- title: Don't Call Me Colin
  creators:
  - Niall Deacon
  - Ruth Angus
  description: "The International Astronomical Union announced that extrasolar planets might get more interesting names. This\
    \ hack is about a planet (Gliese 581d) that really wants a nice mythical name like the Solar System planets, and not to\
    \ be named after a celebrity or someone's cat (Colin)."
  live_url: "https://www.youtube.com/watch?v=dFMoEpj-v7o"
- title: D3PO
  creators:
  - "Adrian Price-Whelan"
  - Josh Peek
  - Chris Beaumont
  - Elisabeth Newton
  - Michelle Borkin
  description: "D3PO is designed to allow an astronomer, with no specialised data visualisation skills, to make an interactive,\
    \ publication-quality figure with staged builds and linked brushing across plots."
  source_url: "https://github.com/adrn/d3po"
  live_url: "http://www.d3po.org/"
- title: Python Client for the NASA ADS API
  creators:
  - Andy Casey (remote simultaneous hack)
  description: A Python module to interact with NASA's ADS that Doesn't Suck.
  source_url: "https://github.com/andycasey/ads"
